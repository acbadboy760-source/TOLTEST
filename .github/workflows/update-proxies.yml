name: Auto-Update Proxies from GitHub Sources

on:
  schedule:
    - cron: '*/30 * * * *'   # هر ۳۰ دقیقه
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: تنظیمات Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: جمع‌آوری و ذخیره‌سازی پروکسی‌های جدید
        run: |
          pip3 install aiohttp

          python3 << 'PYEOF'
          import requests, socket, aiohttp, asyncio, time, os, sys

          PROXY_FILE = "proxies.txt"
          # بهترین منابع که خودشون با گیت‌هاب اکشن آپدیت می‌شن
          SOURCES = [
              "https://raw.githubusercontent.com/Ian-Lusule/Proxies/main/proxies/all_proxies.txt",
              "https://raw.githubusercontent.com/Thordata/awesome-free-proxy-list/main/proxies/all.txt"
          ]

          # ۱. دانلود و ادغام
          raw_proxies = []
          for url in SOURCES:
              try:
                  resp = requests.get(url, timeout=15)
                  proxies = [f"http://{line.strip()}" for line in resp.text.splitlines() if ":" in line]
                  raw_proxies.extend(proxies)
                  print(f"✅ {len(proxies)} پروکسی از {url.split('/')[3]} دریافت شد.")
              except Exception as e:
                  print(f"⚠️ خطا در دانلود {url}: {e}")

          # ۲. حذف موارد تکراری
          raw_proxies = list(set(raw_proxies))
          print(f"📊 {len(raw_proxies)} پروکسی یکتا یافت شد.")

          # ۳. بررسی سلامت پروکسی‌ها (به صورت هم‌زمان)
          async def check_proxy(proxy):
              try:
                  async with aiohttp.ClientSession() as session:
                      start = time.time()
                      async with session.get("https://httpbin.org/ip", proxy=proxy, timeout=5) as resp:
                          if resp.status == 200 and (time.time() - start) < 5.0:
                              return proxy
              except:
                  pass
              return None

          async def filter_proxies():
              tasks = [check_proxy(p) for p in raw_proxies]
              results = await asyncio.gather(*tasks)
              return [p for p in results if p is not None]

          working_proxies = asyncio.run(filter_proxies())
          print(f"✅ {len(working_proxies)} پروکسی سالم از {len(raw_proxies)} مورد.")

          # ۴. ذخیره در فایل
          if working_proxies:
              with open(PROXY_FILE, 'w') as f:
                  f.write('\n'.join(working_proxies[:50]))  # فقط ۵۰ تا از بهترین‌ها
              print(f"📄 {len(working_proxies[:50])} پروکسی سالم در {PROXY_FILE} ذخیره شد.")
          else:
              print("❌ هیچ پروکسی سالمی پیدا نشد. فایل قبلی حفظ می‌شود.")
              sys.exit(0)
          PYEOF

      - name: ارسال تغییرات به ریپازیتوری
        run: |
          git add proxies.txt
          git commit -m "🔄 به‌روزرسانی خودکار پروکسی‌ها" || true
          git push || true
